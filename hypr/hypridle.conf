# /* ---- 💫 Optimized Battery Saver Config 💫 ---- */ 
# Replacing JaKooLit defaults to actually save power

general {
    lock_cmd = pidof hyprlock || hyprlock       # runs hyprlock if not running
    before_sleep_cmd = loginctl lock-session    # lock before suspend
    after_sleep_cmd = hyprctl dispatch dpms on  # wake up screen immediately
    ignore_dbus_inhibit = false                 # let firefox/steam block sleep if watching video
}

# 1. Dim Screen (2.5 mins) - Saves huge power
listener {
    timeout = 150                                
    on-timeout = brightnessctl -s set 10         
    on-resume = brightnessctl -r                 
}

# 2. Turn Off Screen (5 mins) - The GPU stops rendering here
listener { 
    timeout = 300                                
    on-timeout = hyprctl dispatch dpms off       
    on-resume = hyprctl dispatch dpms on         
}

# 3. Lock Session (5.5 mins) - Security
listener {
    timeout = 330                                
    on-timeout = loginctl lock-session           
}

# 4. Suspend System (10 mins) - Deep sleep
listener {
    timeout = 600                                
    on-timeout = systemctl suspend               
}

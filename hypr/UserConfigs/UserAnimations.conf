# =================================================================
# ANIMATIONS — smooth, fast, polished
# =================================================================

animations {
  enabled = yes

  bezier = ease, 0.25, 0.1, 0.25, 1.0
  bezier = easeOut, 0.0, 0.0, 0.2, 1.0
  bezier = easeIn, 0.4, 0.0, 1.0, 1.0
  bezier = snappy, 0.2, 0.9, 0.3, 1.0
  bezier = liner, 1, 1, 1, 1

  animation = windows, 1, 4, snappy, slide
  animation = windowsIn, 1, 3, easeOut, slide
  animation = windowsOut, 1, 2, easeIn, slide
  animation = windowsMove, 1, 3, snappy, slide
  animation = border, 1, 2, liner
  animation = fade, 1, 3, easeOut
  animation = workspaces, 1, 4, snappy, slide
  animation = workspacesIn, 1, 3, easeOut, slide
  animation = workspacesOut, 1, 3, easeIn, slide
}
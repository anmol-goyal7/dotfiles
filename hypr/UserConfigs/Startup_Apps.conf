# Commands and Apps to be executed at launch

$scriptsDir = $HOME/.config/hypr/scripts
$UserScripts = $HOME/.config/hypr/UserScripts

$lock = $scriptsDir/LockScreen.sh

# =================================================================
# BACKGROUND - no wallpaper daemon; Hyprland paints solid black
# (misc:background_color in UserSettings.conf - OLED saver)
# =================================================================



# =================================================================
# SYSTEM STARTUP
# =================================================================
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP

# Initialize Drop Down terminal
exec-once = $HOME/.config/hypr/scripts/Dropterminal.sh kitty &

# Polkit (Polkit Gnome / KDE)
exec-once = $scriptsDir/Polkit.sh

# Startup apps
# exec-once = nm-applet --indicator # disabled — wifi is managed by iwd now, not NetworkManager
exec-once = swaync
# exec-once = blueman-applet # removed — blueman uninstalled; BT via bluetui + rfkill toggles
# exec-once = rog-control-center # Comment this out if you don't have an ASUS ROG laptop
exec-once = bash -c 'pkill waybar; sleep 0.2 && waybar'
exec-once = qs 

# Clipboard manager
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store

# Hypridle (Controls screen dimming/sleeping)
exec-once = hypridle

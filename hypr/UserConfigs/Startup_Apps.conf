# Commands and Apps to be executed at launch

$scriptsDir = $HOME/.config/hypr/scripts
$UserScripts = $HOME/.config/hypr/UserScripts

$wallDIR=$HOME/Pictures/wallpapers
$lock = $scriptsDir/LockScreen.sh
$SwwwRandom = $UserScripts/WallpaperAutoChange.sh
$livewallpaper=""

# =================================================================
# WALLPAPER CONFIGURATION (OLED SAVER)
# =================================================================
exec-once = swww-daemon --format xrgb

# This forces the black wallpaper 2 seconds after login
# --transition-type none ensures no GPU waste on animations
exec-once = sleep 2 && swww img $HOME/.config/hypr/black.png --transition-type none

# (Optional) Random wallpaper switcher - Disabled for Battery Saving
#exec-once = $SwwwRandom $wallDIR 

# =================================================================
# SYSTEM STARTUP
# =================================================================
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP

# Initialize Drop Down terminal
exec-once = $HOME/.config/hypr/scripts/Dropterminal.sh kitty &

# Polkit (Polkit Gnome / KDE)
exec-once = $scriptsDir/Polkit.sh

# Startup apps
exec-once = nm-applet --indicator
exec-once = swaync
exec-once = blueman-applet
# exec-once = rog-control-center # Comment this out if you don't have an ASUS ROG laptop
exec-once = waybar
exec-once = qs 

# Clipboard manager
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store

# Hypridle (Controls screen dimming/sleeping)
exec-once = hypridle


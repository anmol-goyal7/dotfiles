# =================================================================
# USER KEYBINDS
# =================================================================
$mainMod = SUPER
$scriptsDir = $HOME/.config/hypr/scripts
$UserScripts = $HOME/.config/hypr/UserScripts
$UserConfigs = $HOME/.config/hypr/UserConfigs

# Load default settings
source = $UserConfigs/01-UserDefaults.conf

# =================================================================
# 📸 SCREENSHOT & TEXT TOOLS (OCR)
# =================================================================

# 1. Region screenshot (Super+Shift+S) — saves + copies to clipboard
bind = $mainMod SHIFT, S, exec, hyprshot -m region -z -o "$HOME/Pictures/Screenshots"

# 2. Active window screenshot (Super+Shift+Print)
bind = $mainMod SHIFT, Print, exec, hyprshot -m window -z -o "$HOME/Pictures/Screenshots"

# 3. Full monitor screenshot (Super+Print)
bind = $mainMod, Print, exec, hyprshot -m output -o "$HOME/Pictures/Screenshots"

# 4. Text Detector (OCR)
bind = $mainMod SHIFT, T, exec, grim -g "$(slurp -d -b 00000000 -c 00ff00ff -w 2)" - | tesseract - - | wl-copy

# =================================================================
# 🚀 TRACKPAD-LESS WORKFLOW
# =================================================================

# --- 1. VIM MOTION FOCUS (switch windows) --- #
bind = $mainMod, h, movefocus, l
bind = $mainMod, l, movefocus, r
bind = $mainMod, k, movefocus, u
bind = $mainMod, j, movefocus, d

# --- 2. VIM MOTION RESIZE WINDOW --- #
binde = $mainMod SHIFT, h, resizeactive, -30 0
binde = $mainMod SHIFT, l, resizeactive, 30 0
binde = $mainMod SHIFT, k, resizeactive, 0 -30
binde = $mainMod SHIFT, j, resizeactive, 0 30

# --- 3. VIM MOTION MOVE WINDOW --- #
bind = $mainMod CTRL, h, movewindow, l
bind = $mainMod CTRL, l, movewindow, r
bind = $mainMod CTRL, k, movewindow, u
bind = $mainMod CTRL, j, movewindow, d

# --- 4. WORKSPACE SWITCHING (Win+1-9) --- #
# Handled by configs/Keybinds.conf using code:10-19 (avoids duplicate binding glitch)

# --- 3. RESIZE SUBMAP (Red Border Indicator) --- #
bind = $mainMod, R, exec, hyprctl keyword general:col.active_border rgba(f7768eff)
bind = $mainMod, R, submap, resize

submap = resize
binde = , l, resizeactive, 10 0
binde = , h, resizeactive, -10 0
binde = , k, resizeactive, 0 -10
binde = , j, resizeactive, 0 10
# Reset border color on exit
bind = , escape, exec, hyprctl keyword general:col.active_border rgba(7aa2f7cc)
bind = , escape, submap, reset 
submap = reset

# --- 4. KEYBOARD MOUSE CONTROL (Ydotool) --- #
# movecursor removed — Super+Ctrl+hjkl now used for movewindow
bind = $mainMod CTRL, Space, exec, ydotool click 0xC0 # Left Click
bind = $mainMod CTRL, x, exec, ydotool click 0xC1     # Right Click

# --- 5. CLICK ANYTHING (wl-kbptr) — warp cursor to a screen label, then click --- #
# Super+Ctrl+M: type letters to narrow to a point, cursor warps there + left-clicks.
# Cursor stays put on Escape (no click). Pair with Super+Ctrl+x for right-click.
bind = $mainMod CTRL, M, exec, wl-kbptr && ydotool click 0xC0

# =================================================================
# 🪟 WINDOW MANAGEMENT & LAUNCHERS
# =================================================================

# 1. Spotlight Search — Tokyo Night OLED rofi (matches waybar)
bind = $mainMod, SPACE, exec, pkill rofi || rofi -show drun -theme ~/.config/rofi/themes/tokyonight-oled.rasi

# 2. Window State
bind = $mainMod SHIFT, F, togglefloating      # Shift+F to Float
bind = $mainMod, F, fullscreen                # F for Fullscreen
bind = $mainMod CTRL, F, fullscreen, 1        # Fake Fullscreen
bind = $mainMod ALT, SPACE, exec, hyprctl dispatch workspaceopt allfloat # All Float Mode

# 3. Other Actions
bind = $mainMod, Q, killactive
bind = $mainMod, V, layoutmsg, togglesplit # Vertical/Horizontal split toggle
bind = $mainMod, P, pseudo # Dwindle effect

# =================================================================
# 💻 SYSTEM BINDS & SCRIPTS
# =================================================================

bind = $mainMod, B, exec, $browser
bind = $mainMod, D, exec, brave
bind = $mainMod, A, global, quickshell:overviewToggle 
bind = $mainMod, Return, exec, $term 
bind = $mainMod, E, exec, $files 

# FEATURES / EXTRAS
bind = $mainMod CTRL SHIFT, H, exec, $scriptsDir/KeyHints.sh # Help / Cheat Sheet

bind = $mainMod ALT, R, exec, $scriptsDir/Refresh.sh 
bind = $mainMod ALT, E, exec, BEMOJI_PICKER_CMD="wofi -d" bemoji -t # Emoji picker (types directly)
bind = $mainMod, S, exec, $scriptsDir/RofiSearch.sh 
bind = $mainMod CTRL, S, exec, rofi -show window 
bind = $mainMod ALT, O, exec, $scriptsDir/ChangeBlur.sh
bind = $mainMod SHIFT, G, exec, $scriptsDir/GameMode.sh
bind = $mainMod ALT, L, exec, $scriptsDir/ChangeLayout.sh
bind = $mainMod CTRL, R, exec, $scriptsDir/RofiThemeSelector.sh
bind = $mainMod CTRL SHIFT, R, exec, pkill rofi || true && $scriptsDir/RofiThemeSelector-modified.sh 

bind = $mainMod SHIFT, Return, exec, $scriptsDir/Dropterminal.sh $term

# Desktop zooming
bind = $mainMod ALT, mouse_down, exec, hyprctl keyword cursor:zoom_factor "$(hyprctl getoption cursor:zoom_factor | awk 'NR==1 {factor = $2; if (factor < 1) {factor = 1}; print factor * 2.0}')"
bind = $mainMod ALT, mouse_up, exec, hyprctl keyword cursor:zoom_factor "$(hyprctl getoption cursor:zoom_factor | awk 'NR==1 {factor = $2; if (factor < 1) {factor = 1}; print factor / 2.0}')" 

# Waybar / Bar related
bind = $mainMod CTRL ALT, B, exec, pkill -SIGUSR1 waybar 

# Night light toggle (Hyprsunset)
bind = $mainMod, N, exec, $scriptsDir/Hyprsunset.sh toggle

# UserScripts
bind = $mainMod CTRL, O, exec, hyprctl setprop active opaque toggle 
bind = $mainMod CTRL SHIFT, K, exec, $scriptsDir/KeyBinds.sh 
bind = $mainMod SHIFT, A, exec, $scriptsDir/Animations.sh 
bindln = ALT_L, SHIFT_L, exec, $scriptsDir/SwitchKeyboardLayout.sh 
bindln = SHIFT_L, ALT_L, exec, $scriptsDir/Tak0-Per-Window-Switch.sh 

# Move current workspaces to monitors
bind = $mainMod CTRL, F9, movecurrentworkspacetomonitor, l 
bind = $mainMod CTRL, F10, movecurrentworkspacetomonitor, r 
bind = $mainMod CTRL, F11, movecurrentworkspacetomonitor, u 
bind = $mainMod CTRL, F12, movecurrentworkspacetomonitor, d

# =================================================================
# 🆕 KEYBOARD-FIRST ADDITIONS
# =================================================================

# --- TUI Apps (open in kitty) ---
bind = $mainMod ALT, G, exec, kitty --class lazygit -e lazygit    # Git TUI
# bind = $mainMod ALT, M, ...  # disabled: ncmpcpp not installed & no local library (you use Spotify). Install ncmpcpp+mpd to revive.
bind = $mainMod ALT, T, exec, kitty --class btop -e btop          # System monitor

# --- Notifications ---
bind = $mainMod, grave, exec, swaync-client -t           # Toggle notification panel
bind = $mainMod SHIFT, grave, exec, swaync-client -C     # Clear all notifications

# --- Clipboard ---
bind = $mainMod ALT, V, exec, $scriptsDir/ClipManager.sh

# --- Power Modes ---
bind = $mainMod, F1, exec, kitty --class power-saver -e saver          # Battery saver
bind = $mainMod, F2, exec, kitty --class power-balance -e balance       # Balanced
bind = $mainMod, F3, exec, kitty --class power-performance -e performance # Performance
bind = $mainMod, F4, exec, kitty --class power-game -e game             # Game (max everything)
bind = $mainMod SHIFT, F4, exec, kitty --class power-status -e powermode # Show current mode

# --- Desktop Zoom (keyboard alternative to mouse scroll) ---
bind = $mainMod ALT, equal, exec, hyprctl keyword cursor:zoom_factor "$(hyprctl getoption cursor:zoom_factor | awk 'NR==1{f=$2; if(f<1)f=1; printf "%.1f", f*1.5}')"
bind = $mainMod ALT, minus, exec, hyprctl keyword cursor:zoom_factor "$(hyprctl getoption cursor:zoom_factor | awk 'NR==1{f=$2; if(f<1)f=1; printf "%.1f", f/1.5}')"
bind = $mainMod ALT, 0, exec, hyprctl keyword cursor:zoom_factor 1   # Reset zoom

# =================================================================
# 📡 SYSTEM TOGGLES — no mouse needed
# =================================================================

# Wi-Fi: SUPER+F5 toggle, SUPER+CTRL+W open impala (WiFi TUI)
bind = $mainMod, F5, exec, $scriptsDir/ToggleWifi.sh
bind = $mainMod SHIFT, F5, exec, kitty --class impala -e impala
bind = $mainMod CTRL, W, exec, kitty --class impala -e impala

# Bluetooth: SUPER+F6 toggle, SUPER+CTRL+B open bluetui (Bluetooth TUI)
# Unbind F6 screenshot binds from Laptops.conf to avoid conflict
unbind = $mainMod, F6
unbind = $mainMod SHIFT, F6
bind = $mainMod, F6, exec, $scriptsDir/ToggleBluetooth.sh
bind = $mainMod SHIFT, F6, exec, kitty --class bluetui -e bluetui
bind = $mainMod CTRL, B, exec, kitty --class bluetui -e bluetui

# Audio: SUPER+F7 mute toggle, SUPER+SHIFT+F7 open pavucontrol
bind = $mainMod, F7, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bind = $mainMod SHIFT, F7, exec, pavucontrol

# Airplane mode: SUPER+F8 toggle (kills both wifi + bt)
bind = $mainMod, F8, exec, $scriptsDir/ToggleAirplane.sh

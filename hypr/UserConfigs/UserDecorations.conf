# =================================================================
# DECORATIONS — Tokyo Night OLED
# =================================================================

general {
  border_size = 2
  gaps_in = 2
  gaps_out = 4

  # Tokyo Night borders — subtle blue active, near-black inactive
  col.active_border = rgba(7aa2f7cc)
  col.inactive_border = rgba(15161eff)
}

decoration {
    rounding = 8

    active_opacity = 1.0
    inactive_opacity = 1.0
    fullscreen_opacity = 1.0

    blur {
        enabled = false
    }

    shadow {
        enabled = false
    }
}

group {
  col.border_active = rgba(7aa2f7cc)

  groupbar {
    col.active = rgba(7aa2f7cc)
    col.inactive = rgba(0a0a0fff)
    font_size = 12
    text_color = rgba(c0caf5ff)
    height = 20
  }
}

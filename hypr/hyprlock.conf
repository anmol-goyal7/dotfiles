# Minimal hyprlock — OLED pure-black Tokyo Night (matches the rice)
# Created 2026-07-11 as part of enabling hypridle auto-lock.

general {
    hide_cursor = true
    ignore_empty_input = true
    grace = 2                     # 2s grace so a stray keypress after dpms-off doesn't force a password
}

background {
    monitor =
    color = rgba(000000ff)        # pure black — OLED saver
}

# Clock
label {
    monitor =
    text = cmd[update:1000] echo "$(date +'%H:%M')"
    color = rgba(c0caf5ff)        # Tokyo Night foreground
    font_size = 90
    font_family = JetBrainsMono Nerd Font
    position = 0, 160
    halign = center
    valign = center
}

# Date
label {
    monitor =
    text = cmd[update:60000] echo "$(date +'%A, %d %B')"
    color = rgba(565f89ff)        # Tokyo Night comment/muted
    font_size = 20
    font_family = JetBrainsMono Nerd Font
    position = 0, 80
    halign = center
    valign = center
}

# Password input
input-field {
    monitor =
    size = 260, 50
    outline_thickness = 2
    dots_size = 0.25
    dots_spacing = 0.3
    dots_center = true
    outer_color = rgba(7aa2f7ff)  # Tokyo Night blue accent
    inner_color = rgba(1a1b26ff)  # Tokyo Night bg
    font_color = rgba(c0caf5ff)
    fade_on_empty = false
    placeholder_text = <i>password</i>
    check_color = rgba(9ece6aff)  # green while checking
    fail_color = rgba(f7768eff)   # red on wrong password
    fail_text = <i>$FAIL ($ATTEMPTS)</i>
    position = 0, -40
    halign = center
    valign = center
}

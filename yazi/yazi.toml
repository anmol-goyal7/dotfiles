# =============================================================================
# YAZI CONFIG — TUI FILE MANAGER
# Symlink: ln -sf ~/repos/dotfiles/yazi ~/.config/yazi
# =============================================================================

[manager]
ratio          = [1, 2, 3]   # Panel width ratio: parent | current | preview
sort_by        = "natural"
sort_sensitive = false
sort_reverse   = false
sort_dir_first = true
show_hidden    = false        # Toggle with . key
show_symlink   = true
scrolloff      = 5

[preview]
tab_size        = 2
max_width       = 600
max_height      = 900
cache_dir       = ""
image_delay     = 30
image_filter    = "triangle"
image_quality   = 75
sixel_fraction  = 15
ueberzug_scale  = 1
ueberzug_offset = [0, 0, 0, 0]

[opener]
edit = [
  { run = 'nvim "$@"', desc = "Edit in Neovim", block = true },
]
open = [
  { run = 'xdg-open "$@"', desc = "Open with default app" },
]
play = [
  { run = 'mpv "$@"', desc = "Play with mpv" },
]
view_pdf = [
  { run = 'zathura "$@"', desc = "View in Zathura" },
]
view_img = [
  { run = 'nsxiv "$@"', desc = "View in nsxiv" },
  { run = 'xdg-open "$@"', desc = "Open with default" },
]
extract = [
  { run = 'tar xf "$@"', desc = "Extract archive" },
]

[open]
rules = [
  { name = "*/",                  use = ["edit", "open"] },
  { mime = "text/*",              use = ["edit", "open"] },
  { mime = "image/*",             use = ["view_img", "open"] },
  { mime = "video/*",             use = ["play", "open"] },
  { mime = "audio/*",             use = ["play"] },
  { mime = "application/pdf",     use = ["view_pdf", "open"] },
  { mime = "application/zip",     use = ["extract", "open"] },
  { mime = "application/x-tar",   use = ["extract", "open"] },
  { mime = "application/gzip",    use = ["extract", "open"] },
  { mime = "inode/x-empty",       use = ["edit"] },
  { mime = "*",                   use = ["open"] },
]

[tasks]
micro_workers    = 10
macro_workers    = 25
bizarre_retry    = 5
image_alloc      = 536870912
image_bound      = [0, 0]
suppress_preload = false

[plugin]
preloaders = [
  { name = "*",               cond = "!mime", run = "mime" },
  { mime = "image/*",                         run = "image" },
  { mime = "video/*",         cond = "!vide", run = "video" },
  { mime = "application/pdf",                 run = "pdf" },
]
previewers = [
  { name = "*/",              run = "folder" },
  { mime = "text/*",          run = "code" },
  { mime = "image/*",         run = "image" },
  { mime = "video/*",         run = "video" },
  { mime = "application/pdf", run = "pdf" },
  { mime = "application/json",run = "json" },
  { mime = "*",               run = "file" },
]

[input]
cursor_blink = true

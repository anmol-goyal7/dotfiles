# =============================================================================
# TMUX CONFIG — VIM-STYLE, KEYBOARD-ONLY
# Symlink: ln -sf ~/repos/dotfiles/tmux/tmux.conf ~/.tmux.conf
# =============================================================================

# --- Prefix: Ctrl+Space ---
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# --- Core ---
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -sg escape-time 0          # No delay for Esc (critical for nvim)
set -g mouse off               # Keyboard only
set -g history-limit 10000
set -g base-index 1            # Windows start at 1
setw -g pane-base-index 1
set -g renumber-windows on     # Auto-renumber on close
set -g focus-events on         # For nvim autoread

# --- Vim keys in copy mode ---
setw -g mode-keys vi

bind Escape copy-mode           # Enter copy mode like vim

bind -T copy-mode-vi v   send -X begin-selection
bind -T copy-mode-vi V   send -X select-line
bind -T copy-mode-vi C-v send -X rectangle-toggle
bind -T copy-mode-vi y   send -X copy-pipe-and-cancel "wl-copy"
bind -T copy-mode-vi Escape send -X cancel

# Search in copy mode (/ and ?)
bind -T copy-mode-vi / command-prompt -p "Search:" "send -X search-forward '%%'"
bind -T copy-mode-vi ? command-prompt -p "Search:" "send -X search-backward '%%'"

# --- Pane Navigation — syncs with nvim via vim-tmux-navigator ---
# C-hjkl moves between tmux panes AND nvim splits seamlessly
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|l?n?vim?x?)(diff)?$'"

bind -n 'C-h' if-shell "$is_vim" 'send-keys C-h' 'select-pane -L'
bind -n 'C-j' if-shell "$is_vim" 'send-keys C-j' 'select-pane -D'
bind -n 'C-k' if-shell "$is_vim" 'send-keys C-k' 'select-pane -U'
bind -n 'C-l' if-shell "$is_vim" 'send-keys C-l' 'select-pane -R'

# Fallback for copy mode
bind -T copy-mode-vi 'C-h' select-pane -L
bind -T copy-mode-vi 'C-j' select-pane -D
bind -T copy-mode-vi 'C-k' select-pane -U
bind -T copy-mode-vi 'C-l' select-pane -R

# --- Pane Splitting (like vim :vsp and :sp) ---
bind v split-window -h -c "#{pane_current_path}"
bind s split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# --- Pane Resizing (repeatable with -r) ---
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Zoom pane (toggle fullscreen for one pane)
bind z resize-pane -Z

# --- Window Management ---
bind c new-window -c "#{pane_current_path}"
bind n next-window
bind p previous-window
bind l last-window
bind w choose-tree -Zw

# Kill with confirmation
bind x confirm-before -p "Kill pane? (y/n)" kill-pane
bind X confirm-before -p "Kill window? (y/n)" kill-window
bind q confirm-before -p "Kill session? (y/n)" kill-session

# Quick window switching: prefix + number
bind 1 select-window -t 1
bind 2 select-window -t 2
bind 3 select-window -t 3
bind 4 select-window -t 4
bind 5 select-window -t 5

# --- Reload Config ---
bind r source-file ~/.tmux.conf \; display-message "Config reloaded!"

# --- Session Management ---
bind N new-session
bind S choose-session

# --- Status Bar ---
set -g status-position top
set -g status-style "bg=#1e1e2e,fg=#cdd6f4"
set -g status-left-length 40
set -g status-right-length 60

set -g status-left "#[bg=#89b4fa,fg=#1e1e2e,bold] #S #[bg=#1e1e2e,fg=#89b4fa,nobold]"
set -g status-right "#[fg=#6c7086] %Y-%m-%d  #[fg=#cdd6f4]%H:%M "

set -g window-status-format         "#[fg=#6c7086]  #I:#W "
set -g window-status-current-format "#[bg=#313244,fg=#89b4fa,bold]  #I:#W "

# Pane borders
set -g pane-border-style        "fg=#313244"
set -g pane-active-border-style "fg=#89b4fa"

# Message / command prompt
set -g message-style "bg=#313244,fg=#cdd6f4"
